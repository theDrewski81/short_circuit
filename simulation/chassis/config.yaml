# PPO locomotion training config -- Johnny 5 tread chassis (Phase 02, Task 4).
# Defaults target a full run on the home-lab RTX 3080. CLI flags in train.py
# (--timesteps, --n-envs, --smoke) override for quick local checks.

env:
  n_envs: 8
  command_hold: true        # one command per episode (false = switch mid-episode)
  reward:                   # forwarded to JohnnyChassisEnv (see env.py)
    w_vel: 1.0              # forward-velocity tracking
    w_yaw: 1.0              # yaw-rate tracking (subsumes heading-hold when w_cmd=0)
    w_energy: 0.01          # action^2 penalty
    w_stability: 0.5        # roll^2 + pitch^2 penalty
    w_lateral: 0.2          # sideways-skid penalty
    k_vel: 50.0             # velocity-tracking sharpness
    k_yaw: 30.0             # yaw-tracking sharpness

ppo:
  net_arch: [64, 64]        # small MLP -> fast onnxruntime inference on the Pi
  learning_rate: 3.0e-4
  n_steps: 2048             # rollout horizon per env
  batch_size: 4096          # divides n_envs * n_steps (8*2048=16384)
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5

train:
  total_timesteps: 3000000
  eval_freq: 50000          # env steps between evaluations (per-env basis)
  n_eval_episodes: 20
  checkpoint_freq: 200000
  seed: 0
  normalize_obs: true
  normalize_reward: true
  device: auto              # 'cuda' on the home lab, 'cpu' locally

paths:
  run_dir: runs             # checkpoints, tensorboard, best model
  model_name: locomotion_v1 # -> <run_dir>/<name>/{model.zip, vecnormalize.pkl}
